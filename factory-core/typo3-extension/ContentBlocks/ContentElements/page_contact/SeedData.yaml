headline: Contact
title: Get in Touch
description: We'd love to hear from you. Reach out to us for a free consultation.
orientation: horizontal
submit_label: Send Message
contact_items:
  - icon: i-lucide-map-pin
    label: Address
    value: 123 Example Street, 12345 City
    type: address
  - icon: i-lucide-phone
    label: Phone
    value: "+49 123 456 789"
    type: phone
  - icon: i-lucide-mail
    label: Email
    value: info@example.com
    type: email
form_fields:
  - label: First Name
    name: first_name
    type: text
    required: 1
    placeholder: John
    col_span: "1"
  - label: Last Name
    name: last_name
    type: text
    required: 1
    placeholder: Doe
    col_span: "1"
  - label: Email
    name: email
    type: email
    required: 1
    placeholder: john@example.com
    col_span: "2"
  - label: Message
    name: message
    type: textarea
    required: 0
    placeholder: Your message...
    col_span: "2"
