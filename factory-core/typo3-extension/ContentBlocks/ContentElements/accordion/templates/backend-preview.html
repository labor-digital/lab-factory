<f:layout name="Preview" />
<f:section name="Content">
    <strong>Accordion</strong>
    <small>({data.type}, {data.items -> f:count()} item<f:if condition="{data.items -> f:count()} != 1">s</f:if>)</small>
    <f:if condition="{data.items}">
        <ul>
            <f:for each="{data.items}" as="item" iteration="i">
                <f:if condition="{i.cycle} <= 5">
                    <li>{item.label}</li>
                </f:if>
            </f:for>
        </ul>
    </f:if>
</f:section>
