name: factory/accordion
title: Accordion
description: A stacked set of collapsible panels.
category: factory
icon: content-text
fields:
  - identifier: type
    type: Select
    label: Type
    description: Whether a single or multiple items can be open at a time.
    options:
      - { label: Single, value: single }
      - { label: Multiple, value: multiple }
    default: single
  - identifier: collapsible
    type: Checkbox
    label: Collapsible
    description: Allow closing all items when type is single.
    default: 1
  - identifier: items
    type: Collection
    label: Items
    description: A list of collapsible panels.
    fields:
      - identifier: label
        type: Text
        label: Label
      - identifier: icon
        type: Text
        label: Icon
        description: Iconify icon name displayed on the left side.
      - identifier: content
        type: Textarea
        label: Content
        description: The content displayed when the panel is open.
      - identifier: disabled
        type: Checkbox
        label: Disabled
        description: Prevent this item from being opened.
