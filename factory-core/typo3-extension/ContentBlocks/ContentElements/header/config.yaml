name: factory/header
title: Header
description: Site-wide page header with logo, primary navigation, and optional CTA. Variants — classic, transparent (over-hero), minimal (centered logo), mega (with mega-menu).
group: factory
icon: content-elements-mailform
fields:
  - identifier: variant
    type: Select
    renderType: selectSingle
    label: Variant
    items:
      - { label: Classic (white bar, bottom border), value: classic }
      - { label: Transparent (over hero, light text), value: transparent }
      - { label: Minimal (logo centered, burger + CTA), value: minimal }
      - { label: Mega (with mega-menu dropdowns), value: mega }
    default: classic

  - identifier: logo_text
    type: Text
    label: Logo Text
    description: Used when no logo image is provided.

  - identifier: logo_image
    type: File
    label: Logo Image
    allowedFileExtensions: ['svg', 'png', 'webp']
    maxItems: 1

  - identifier: cta_label
    type: Text
    label: CTA Label

  - identifier: cta_to
    type: Link
    label: CTA Link

  - identifier: links
    type: Collection
    label: Primary Navigation
    fields:
      - identifier: label
        type: Text
        label: Label
      - identifier: to
        type: Link
        label: Link
      - identifier: active
        type: Checkbox
        label: Mark as Active
      - identifier: children
        type: Collection
        label: Mega-Menu Children
        description: Used by the Mega variant. Group child links via the Group field.
        fields:
          - identifier: group
            type: Text
            label: Group (column heading)
          - identifier: label
            type: Text
            label: Label
          - identifier: to
            type: Link
            label: Link
