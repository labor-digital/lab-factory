name: factory/header
title: Header
description: A headline element with optional separator.
group: factory
icon: content-text
fields:
  - identifier: text
    type: Text
    label: Headline
    description: The headline text.
  - identifier: level
    type: Select
    renderType: selectSingle
    label: Level
    description: The heading level.
    items:
      - { label: H1, value: h1 }
      - { label: H2, value: h2 }
      - { label: H3, value: h3 }
      - { label: H4, value: h4 }
      - { label: H5, value: h5 }
      - { label: H6, value: h6 }
    default: h2
  - identifier: alignment
    type: Select
    renderType: selectSingle
    label: Alignment
    items:
      - { label: Left, value: left }
      - { label: Center, value: center }
      - { label: Right, value: right }
    default: left
  - identifier: separator
    type: Checkbox
    label: Show Separator
    description: Display a separator line below the headline.
  - identifier: separator_color
    type: Select
    renderType: selectSingle
    label: Separator Color
    items:
      - { label: Primary, value: primary }
      - { label: Secondary, value: secondary }
      - { label: Neutral, value: neutral }
      - { label: Success, value: success }
      - { label: Info, value: info }
      - { label: Warning, value: warning }
      - { label: Error, value: error }
  - identifier: separator_type
    type: Select
    renderType: selectSingle
    label: Separator Type
    items:
      - { label: Solid, value: solid }
      - { label: Dashed, value: dashed }
      - { label: Dotted, value: dotted }
    default: solid
  - identifier: separator_size
    type: Select
    renderType: selectSingle
    label: Separator Size
    items:
      - { label: Extra Small, value: xs }
      - { label: Small, value: sm }
      - { label: Medium, value: md }
      - { label: Large, value: lg }
      - { label: Extra Large, value: xl }
    default: sm
