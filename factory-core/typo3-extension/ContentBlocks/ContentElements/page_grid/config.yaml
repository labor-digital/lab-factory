name: factory/page-grid
title: Page Grid
description: A responsive grid of cards to display content in a flexible layout.
group: factory
icon: content-text
fields:
  - identifier: cards
    type: Collection
    label: Cards
    description: A list of cards to display in the grid.
    fields:
      - identifier: icon
        type: Text
        label: Icon
        description: Iconify icon name displayed above the title.
      - identifier: title
        type: Text
        label: Title
      - identifier: description
        type: Text
        label: Description
      - identifier: orientation
        type: Select
        renderType: selectSingle
        label: Orientation
        items:
          - { label: Vertical, value: vertical }
          - { label: Horizontal, value: horizontal }
        default: vertical
      - identifier: reverse
        type: Checkbox
        label: Reverse
        description: Reverse the order of the default slot.
      - identifier: variant
        type: Select
        renderType: selectSingle
        label: Variant
        items:
          - { label: Outline, value: outline }
          - { label: Solid, value: solid }
          - { label: Soft, value: soft }
          - { label: Subtle, value: subtle }
          - { label: Ghost, value: ghost }
          - { label: Naked, value: naked }
        default: outline
      - identifier: highlight
        type: Checkbox
        label: Highlight
        description: Display a highlighted border around the card.
      - identifier: highlight_color
        type: Select
        renderType: selectSingle
        label: Highlight Color
        items:
          - { label: Primary, value: primary }
          - { label: Secondary, value: secondary }
          - { label: Neutral, value: neutral }
          - { label: Success, value: success }
          - { label: Info, value: info }
          - { label: Warning, value: warning }
          - { label: Error, value: error }
      - identifier: spotlight
        type: Checkbox
        label: Spotlight
        description: Display a spotlight effect on hover.
      - identifier: spotlight_color
        type: Select
        renderType: selectSingle
        label: Spotlight Color
        items:
          - { label: Primary, value: primary }
          - { label: Secondary, value: secondary }
          - { label: Neutral, value: neutral }
          - { label: Success, value: success }
          - { label: Info, value: info }
          - { label: Warning, value: warning }
          - { label: Error, value: error }
      - identifier: to
        type: Link
        label: Link
        description: Optional link for the card.
      - identifier: target
        type: Select
        renderType: selectSingle
        label: Link Target
        items:
          - { label: Default, value: '' }
          - { label: New Window, value: _blank }
          - { label: Parent, value: _parent }
          - { label: Self, value: _self }
          - { label: Top, value: _top }
      - identifier: image
        type: File
        label: Image
        description: Optional image displayed in the card.
        allowedFileExtensions: ['jpg', 'jpeg', 'png', 'webp', 'svg']
        maxItems: 1
      - identifier: col_span
        type: Select
        renderType: selectSingle
        label: Column Span
        description: How many grid columns this card should span.
        items:
          - { label: '1', value: '1' }
          - { label: '2', value: '2' }
          - { label: '3', value: '3' }
        default: '1'
