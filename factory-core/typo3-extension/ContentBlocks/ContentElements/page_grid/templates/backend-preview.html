<f:layout name="Preview" />
<f:section name="Content">
    <strong>Page Grid</strong>
    <small>({data.cards -> f:count()} card<f:if condition="{data.cards -> f:count()} != 1">s</f:if>)</small>
    <f:if condition="{data.cards}">
        <ul>
            <f:for each="{data.cards}" as="card" iteration="i">
                <f:if condition="{i.cycle} <= 5">
                    <li>{card.title}</li>
                </f:if>
            </f:for>
        </ul>
    </f:if>
</f:section>
