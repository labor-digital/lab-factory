name: factory/text-slider
title: Text Slider
description: A section with header text plus an image/video slider below, with dot pagination.
group: factory
icon: content-text
fields:
  # ------------------------------------------------------------
  # Header block
  # ------------------------------------------------------------
  - identifier: eyebrow
    type: Text
    label: Eyebrow
    description: Small uppercase label above the title.

  - identifier: eyebrow_decoration
    type: Select
    renderType: selectSingle
    label: Eyebrow Decoration
    items:
      - { label: None, value: none }
      - { label: Bar, value: bar }
      - { label: Dot, value: dot }
    default: bar

  - identifier: eyebrow_color
    type: Select
    renderType: selectSingle
    label: Eyebrow / Accent Color
    items:
      - { label: Primary, value: primary }
      - { label: Secondary, value: secondary }
      - { label: Neutral, value: neutral }
      - { label: Success, value: success }
      - { label: Info, value: info }
      - { label: Warning, value: warning }
      - { label: Error, value: error }
    default: primary

  - identifier: title
    type: Text
    label: Title
    description: Main heading. Use <strong>…</strong> to emphasise part of the title in the accent color.

  - identifier: description
    type: Textarea
    label: Description

  - identifier: text_align
    type: Select
    renderType: selectSingle
    label: Header Alignment
    items:
      - { label: Left, value: left }
      - { label: Center, value: center }
      - { label: Right, value: right }
    default: left

  - identifier: buttons
    type: Collection
    label: Buttons
    description: Optional CTAs shown in the header row (opposite side of title when aligned left/right).
    fields:
      - identifier: label
        type: Text
        label: Label
      - identifier: to
        type: Link
        label: Link
      - identifier: target
        type: Select
        renderType: selectSingle
        label: Link Target
        items:
          - { label: Default, value: '' }
          - { label: New Window, value: _blank }
          - { label: Parent, value: _parent }
          - { label: Self, value: _self }
          - { label: Top, value: _top }
      - identifier: color
        type: Select
        renderType: selectSingle
        label: Color
        items:
          - { label: Primary, value: primary }
          - { label: Secondary, value: secondary }
          - { label: Neutral, value: neutral }
          - { label: Success, value: success }
          - { label: Info, value: info }
          - { label: Warning, value: warning }
          - { label: Error, value: error }
      - identifier: variant
        type: Select
        renderType: selectSingle
        label: Variant
        items:
          - { label: Solid, value: solid }
          - { label: Outline, value: outline }
          - { label: Soft, value: soft }
          - { label: Subtle, value: subtle }
          - { label: Ghost, value: ghost }
          - { label: Link, value: link }
      - identifier: size
        type: Select
        renderType: selectSingle
        label: Size
        items:
          - { label: Extra Small, value: xs }
          - { label: Small, value: sm }
          - { label: Medium, value: md }
          - { label: Large, value: lg }
          - { label: Extra Large, value: xl }
      - identifier: icon
        type: Text
        label: Icon
        description: Iconify icon name (e.g., i-lucide-arrow-right).
      - identifier: leading
        type: Checkbox
        label: Leading Icon
      - identifier: trailing
        type: Checkbox
        label: Trailing Icon
      - identifier: block
        type: Checkbox
        label: Full Width

  # ------------------------------------------------------------
  # Slider behaviour
  # ------------------------------------------------------------
  - identifier: aspect_ratio
    type: Select
    renderType: selectSingle
    label: Slide Aspect Ratio
    items:
      - { label: Auto (native), value: auto }
      - { label: Widescreen (16:9), value: '16/9' }
      - { label: Classic (4:3), value: '4/3' }
      - { label: Cinematic (21:9), value: '21/9' }
      - { label: Square (1:1), value: '1/1' }
    default: '16/9'

  - identifier: show_arrows
    type: Checkbox
    label: Show Navigation Arrows
    default: 0

  - identifier: show_pagination
    type: Checkbox
    label: Show Pagination Dots
    default: 1

  - identifier: autoplay
    type: Checkbox
    label: Autoplay
    default: 0

  - identifier: loop
    type: Checkbox
    label: Loop
    default: 1

  # ------------------------------------------------------------
  # Slides (min 1 slide required)
  # ------------------------------------------------------------
  - identifier: slides
    type: Collection
    label: Slides
    description: Each slide holds one image or video plus optional caption.
    minitems: 1
    fields:
      - identifier: type
        type: Select
        renderType: selectSingle
        label: Type
        items:
          - { label: Image, value: image }
          - { label: Video (upload), value: video }
          - { label: Video (URL), value: video_url }
        default: image

      - identifier: image
        type: File
        label: Image
        allowedFileExtensions: ['jpg', 'jpeg', 'png', 'webp', 'svg']
        maxItems: 1
        displayCond: 'FIELD:type:=:image'

      - identifier: video
        type: File
        label: Video (upload)
        description: Self-hosted MP4 / WebM.
        allowedFileExtensions: ['mp4', 'webm']
        maxItems: 1
        displayCond: 'FIELD:type:=:video'

      - identifier: video_url
        type: Text
        label: Video URL
        description: Direct URL to mp4/webm or external stream.
        displayCond: 'FIELD:type:=:video_url'

      - identifier: poster
        type: File
        label: Video Poster
        description: Still image shown before a video plays.
        allowedFileExtensions: ['jpg', 'jpeg', 'png', 'webp']
        maxItems: 1
        displayCond: 'FIELD:type:!=:image'

      - identifier: alt
        type: Text
        label: Alt / Accessibility Text

      - identifier: caption
        type: Text
        label: Caption
