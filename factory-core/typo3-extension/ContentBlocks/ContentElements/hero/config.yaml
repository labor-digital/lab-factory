name: factory/hero
title: Hero
description: A full-bleed hero with multiple slides, background media, and CTA buttons.
group: factory
icon: content-text
fields:
  # ------------------------------------------------------------
  # Hero-level settings (apply to the whole hero / slider)
  # ------------------------------------------------------------
  - identifier: content_position_x
    type: Select
    renderType: selectSingle
    label: Content Position (Horizontal)
    items:
      - { label: Left, value: left }
      - { label: Center, value: center }
      - { label: Right, value: right }
    default: center

  - identifier: content_position_y
    type: Select
    renderType: selectSingle
    label: Content Position (Vertical)
    items:
      - { label: Top, value: top }
      - { label: Center, value: center }
      - { label: Bottom, value: bottom }
    default: center

  - identifier: height
    type: Select
    renderType: selectSingle
    label: Hero Height
    items:
      - { label: Small, value: small }
      - { label: Medium, value: medium }
      - { label: Large, value: large }
      - { label: Fullscreen, value: fullscreen }
    default: medium

  - identifier: show_arrows
    type: Checkbox
    label: Show Navigation Arrows
    default: 0

  - identifier: show_pagination
    type: Checkbox
    label: Show Pagination Dots
    default: 1

  - identifier: autoplay
    type: Checkbox
    label: Autoplay
    description: Automatically advance to the next slide.
    default: 0

  - identifier: loop
    type: Checkbox
    label: Loop
    description: Continue from the first slide after the last.
    default: 1

  # ------------------------------------------------------------
  # Slides collection (min 1 slide required, 1 is auto-seeded)
  # ------------------------------------------------------------
  - identifier: slides
    type: Collection
    label: Slides
    description: Each hero needs at least one slide.
    minitems: 1
    fields:
      - identifier: eyebrow
        type: Text
        label: Eyebrow
        description: Small label displayed above the headline.

      - identifier: headline
        type: Text
        label: Headline

      - identifier: text
        type: Textarea
        label: Text
        description: Optional supporting paragraph.

      - identifier: text_color
        type: Select
        renderType: selectSingle
        label: Text Color
        description: Auto picks light/dark based on background; override if needed.
        items:
          - { label: Auto (based on background), value: auto }
          - { label: Light (white), value: light }
          - { label: Dark (black), value: dark }
        default: auto

      # Background type + three mutually-exclusive sources
      - identifier: background_type
        type: Select
        renderType: selectSingle
        label: Background Type
        items:
          - { label: Color, value: color }
          - { label: Image, value: image }
          - { label: Video, value: video }
        default: color

      - identifier: background_color
        type: Select
        renderType: selectSingle
        label: Background Color
        description: Only used when Background Type is Color.
        items:
          - { label: Primary, value: primary }
          - { label: Secondary, value: secondary }
          - { label: Neutral, value: neutral }
          - { label: Success, value: success }
          - { label: Info, value: info }
          - { label: Warning, value: warning }
          - { label: Error, value: error }
        default: primary
        displayCond: 'FIELD:background_type:=:color'

      - identifier: background_image
        type: File
        label: Background Image
        description: Only used when Background Type is Image.
        allowedFileExtensions: ['jpg', 'jpeg', 'png', 'webp', 'svg']
        maxItems: 1
        displayCond: 'FIELD:background_type:=:image'

      - identifier: background_video
        type: File
        label: Background Video (upload)
        description: Use for self-hosted video. MP4 / WebM.
        allowedFileExtensions: ['mp4', 'webm']
        maxItems: 1
        displayCond: 'FIELD:background_type:=:video'

      - identifier: background_video_url
        type: Text
        label: Background Video URL
        description: Alternative to upload — direct URL to mp4/webm or external stream.
        displayCond: 'FIELD:background_type:=:video'

      - identifier: overlay
        type: Select
        renderType: selectSingle
        label: Overlay / Scrim
        description: Darkens or lightens background for readability (useful on image/video).
        items:
          - { label: None, value: none }
          - { label: Dark, value: dark }
          - { label: Light, value: light }
        default: none

      # Per-slide CTA buttons
      - identifier: buttons
        type: Collection
        label: Buttons
        fields:
          - identifier: label
            type: Text
            label: Label
          - identifier: to
            type: Link
            label: Link
          - identifier: target
            type: Select
            renderType: selectSingle
            label: Link Target
            items:
              - { label: Default, value: '' }
              - { label: New Window, value: _blank }
              - { label: Parent, value: _parent }
              - { label: Self, value: _self }
              - { label: Top, value: _top }
          - identifier: color
            type: Select
            renderType: selectSingle
            label: Color
            items:
              - { label: Primary, value: primary }
              - { label: Secondary, value: secondary }
              - { label: Neutral, value: neutral }
              - { label: Success, value: success }
              - { label: Info, value: info }
              - { label: Warning, value: warning }
              - { label: Error, value: error }
          - identifier: variant
            type: Select
            renderType: selectSingle
            label: Variant
            items:
              - { label: Solid, value: solid }
              - { label: Outline, value: outline }
              - { label: Soft, value: soft }
              - { label: Subtle, value: subtle }
              - { label: Ghost, value: ghost }
              - { label: Link, value: link }
          - identifier: size
            type: Select
            renderType: selectSingle
            label: Size
            items:
              - { label: Extra Small, value: xs }
              - { label: Small, value: sm }
              - { label: Medium, value: md }
              - { label: Large, value: lg }
              - { label: Extra Large, value: xl }
          - identifier: icon
            type: Text
            label: Icon
            description: Iconify icon name (e.g., i-lucide-arrow-right).
          - identifier: leading
            type: Checkbox
            label: Leading Icon
          - identifier: trailing
            type: Checkbox
            label: Trailing Icon
          - identifier: block
            type: Checkbox
            label: Full Width
