services:
  app:
    restart: "no"
    image: '${DOCKER_BASE_IMAGE}:${DOCKER_BASE_TAG}-dev'
    container_name: '${COMPOSE_PROJECT_NAME}'
    ports:
      - "${APP_IP}:80:80"
      - "${APP_IP}:443:443"
    networks:
      - default
      - backend
    env_file:
      - .env
    volumes:
      - ${APP_SSH_DIR}:/home/ssh-labor/.ssh
      - ${APP_WORKING_DIR}:/var/www/html
      - ${APP_LOG_DIR}:/var/www/logs
      - ${APP_OPT_DIR}/bootstrap.sh:/opt/project/bootstrap.sh
      - ${APP_OPT_DIR}/build.sh:/opt/project/build.sh
      - ${APP_OPT_DIR}/development.sh:/opt/project/development.sh
      - ${APP_OPT_DIR}/directories.sh:/opt/project/directories.sh
      - ${APP_OPT_DIR}/permissions.sh:/opt/project/permissions.sh
      - ${APP_ROOT_DIR}/.env.app:/opt/.env.app
      # Mount factory-core nuxt-layer and factory.json
      # factory-core is a symlink created by pipeline-app's scaffoldPhase
      # (pointing at the absolute monorepo factory-core), so this stays
      # layout-agnostic even when the project lives under projects/<name>/.
      - ${APP_ROOT_DIR}factory-core/nuxt-layer:/var/www/modules/nuxt-layer
      - ${APP_ROOT_DIR}../../factory.json:/var/www/modules/factory.json
networks:
  backend:
    name: ${BACKEND_NETWORK}
    external: true
