app = "{{PROJECT_NAME}}-frontend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
