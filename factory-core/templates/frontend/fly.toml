app = "{{PROJECT_NAME}}-frontend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/"
  protocol = "http"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
