name: pr-checks

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  nuxt-layer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: factory-core/nuxt-layer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: npm pack dry-run (verify tarball shape)
        run: npm pack --dry-run

  typo3-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: factory-core/typo3-extension
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
      - name: composer validate
        run: composer validate --strict --no-check-version
      - name: PHP syntax check
        run: |
          find Classes -name "*.php" -print0 | xargs -0 -n1 php -l
          php -l ext_emconf.php
          php -l ext_localconf.php

  typo3-multitenant-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: factory-core/typo3-multitenant-api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
      - name: composer validate
        run: composer validate --strict --no-check-version
      - name: PHP syntax check
        run: |
          find Classes -name "*.php" -print0 | xargs -0 -n1 php -l
          php -l ext_emconf.php
          find Configuration -name "*.php" -print0 | xargs -0 -n1 php -l

  pipeline-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: pipeline-app/package-lock.json
      - run: npm ci
      - name: Stub env vars for svelte-kit sync
        # $env/static/private types are generated from what's available at
        # sync time. CI doesn't have real Supabase credentials, but the
        # type-check only needs the keys to exist — placeholders are fine.
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_PUBLISH_KEY=placeholder-publishable-key
          SUPABASE_SECRET_KEY=placeholder-service-role-key
          EOF
      - run: npx svelte-kit sync
      - run: npx svelte-check --tsconfig ./tsconfig.json
